<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Eco Fénix</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="contenedor">

        <header>

            <h1>🌱 Eco Fénix</h1>

            <p>Tu asistente ecológico inteligente</p>

        </header>

        <main>

            <div class="chat" id="chat">

                <div class="mensaje eco">

                    <strong>🌱 Eco Fénix</strong>

                    <p>¡Hola! 👋 Soy Eco Fénix.</p>

                    <p>Estoy listo para ayudarte a cuidar nuestro planeta.</p>

                    <p>¿Qué deseas saber hoy?</p>

                </div>

            </div>

        </main>

        <footer>

            <input
                type="text"
                id="pregunta"
                placeholder="Escribe tu pregunta aquí...">

            <button id="enviar">

                Enviar

            </button>

        </footer>

    </div>
    <script src="script.js"></script>

</body>

</html>
